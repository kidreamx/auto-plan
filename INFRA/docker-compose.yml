services:
  backend:
    build:
      context: ../BE
      dockerfile: Dockerfile
    container_name: autoplan-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://autoplan-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - autoplan
    restart: unless-stopped

networks:
  autoplan:
    external: true
